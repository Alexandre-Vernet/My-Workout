@if (!exerciseGraphs) {
    <div class="m-2 mt-2">
        <div class="flex justify-content-center">
            <p-skeleton width="10rem" height="2rem"/>
        </div>
        <div class="mt-8">
            <p-skeleton width="100%" height="15rem"/>
        </div>

        <div class="mt-4">
            <div class="flex align-items-stretch justify-center m-3 gap-2">
                <p-skeleton width="50%" height="12rem"/>
                <p-skeleton width="50%" height="12rem"/>
            </div>
            <div class="m-3 mt-2 flex justify-content-center">
                <p-skeleton width="100%" height="12rem"/>
            </div>
        </div>
    </div>
} @else {
    <h1 class="text-center mt-1 font-bold">{{ exerciseGraphs?.exercise?.name }}</h1>
}

<div class="m-2">
    <canvas id="bar" class="mt-8 mb-6"></canvas>
</div>

@if (exerciseGraphs) {
    <div class="flex align-items-stretch justify-center m-3 gap-2">
        <div class="card p-4 border-round-2xl text-primary flex-1">
            <div
                class="p-1 flex-1 flex flex-column justify-center align-items-center flex-grow-1 flex-shrink-0 gap-4 text-center">
                <i class="pi pi-chart-bar" style="font-size: 1.2rem"></i>
                <div class="flex flex-column gap-2">
                    <span class="text-lg">Total soulevé</span>
                    <span class="text-lg text-no-wrap">
                {{ exerciseGraphs.totalWeight }} kg
            </span>
                </div>
            </div>
        </div>

        <div class="card p-4 border-round-2xl text-primary flex-1">
            <div
                class="p-1 flex-1 flex flex-column justify-center align-items-center flex-grow-1 flex-shrink-0 gap-4 text-center">
                <i class="pi pi-gauge" style="font-size: 1.2rem"></i>
                <div class="flex flex-column gap-2">
                    <span class="text-lg">Nombre de séries exécutées</span>
                    <span class="text-lg">
                    {{ exerciseGraphs.totalReps }}
                </span>
                </div>
            </div>
        </div>
    </div>


    <div class="card m-3 p-4 border-round-2xl text-primary">

        <div
            class="p-1 flex-1 flex flex-column justify-center align-items-center flex-grow-1 flex-shrink-0 gap-4 text-center">
            <i class="pi pi-trophy" style="font-size: 1.2rem"></i>
            <div class="flex flex-column gap-2">
                <span class="text-lg">Charge la plus lourde utilisée</span>
                <span class="text-lg text-no-wrap">
                {{ exerciseGraphs.maxWeight }} kg
            </span>
            </div>
        </div>
    </div>
}
