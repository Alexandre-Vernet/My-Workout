<h1 class="mt-2 mb-2 text-center font-bold">Bibliothèque</h1>

<div class="flex flex-wrap justify-center align-content-start gap-3">
    @if (isLoading) {
        @for (skeleton of [1, 2, 3, 4, 5, 6, 7]; track skeleton) {
            <div class="w-full h-6rem surface-100 p-3">
                <p-skeleton width="100%" height="100%"></p-skeleton>
            </div>
        }
    } @else {
        @for (muscleGroup of muscleGroups; track muscleGroup.id) {
            <div [routerLink]="['/', 'library', 'muscle-group', muscleGroup?.id]"
                 class="mt-2 flex align-items-center justify-content-center border-round border-1 surface-border w-full p-4">
            <span class="text-xl font-bold text-primary hover:underline">
                {{ muscleGroup?.name | titlecase }}
            </span>
            </div>
        }
    }
</div>
