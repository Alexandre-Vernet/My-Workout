<div class="exercises-table" [style.visibility]="exercisesMade.getValue().length > 0 ? 'visible' : 'hidden'">
    <p-table #exerciseTable [value]="exercisesMade | async" stripedRows scrollable="true" scrollHeight="180px">
        <ng-template #header>
            <tr>
                <th id="weight" class="text-center">Poids</th>
                <th id="reps" class="text-center">Reps.</th>
                <th id="unilateral" class="text-center">Unilat.</th>
                <th id="restTime" class="text-center">Repos</th>
                <th id="actions" class="text-center"></th>
            </tr>
        </ng-template>
        <ng-template #body let-history let-rowIndex="rowIndex">
            <tr>
                <td [pEditableColumn]="history.weight" class="text-center">
                    <p-cellEditor>
                        <ng-template #input>
                            <p-inputnumber
                                [(ngModel)]="history.weight"
                                inputStyleClass="update-weight"
                                inputId="weight-input"
                                (ngModelChange)="onWeightChange(history, $event)"
                                (focusout)="updateHistory(history)"
                                [min]="0"
                                [max]="500"
                                size="small"
                                [autofocus]="true"
                                mode="decimal"
                                [maxFractionDigits]="1"
                                [maxFractionDigits]="2"
                            ></p-inputnumber>
                        </ng-template>
                        <ng-template #output>
                            {{ history.weight > 0 ? history.weight + ' kg' : '/' }}
                        </ng-template>
                    </p-cellEditor>
                </td>
                <td [pEditableColumn]="history.reps" class="text-center">
                    <p-cellEditor>
                        <ng-template #input>
                            <p-inputnumber
                                [(ngModel)]="history.reps"
                                inputStyleClass="update-reps"
                                inputId="reps-input"
                                (focusout)="updateHistory(history)"
                                [min]="1"
                                [max]="99"
                                size="small"
                                [autofocus]="true"
                            ></p-inputnumber>
                        </ng-template>
                        <ng-template #output>
                            {{ history.reps }}
                        </ng-template>
                    </p-cellEditor>
                </td>
                <td class="text-center">
                <p-checkbox [id]="rowIndex" [(ngModel)]="history.unilateral" (ngModelChange)="updateHistory(history, $event)"
                                [binary]="true"/>
                </td>
                <td class="text-center">{{ history.restTime }}</td>
                <td class="text-center" (click)="deleteHistory(history)">
                    <i class="pi pi-trash p-1"></i>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
