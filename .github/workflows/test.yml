name: Run test

on:
    pull_request: 

jobs:
    tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21

            - name: Run tests
              run: mvn clean test
              working-directory: my-workout-api